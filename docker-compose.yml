services:
  questdb:
    image: questdb/questdb:9.3.5
    container_name: questdb
    restart: always
    ports:
      - "9000:9000"   # Web Console 및 REST API
      - "9009:9009"   # InfluxDB Line Protocol (고속 데이터 삽입)
      - "8812:8812"   # Postgres Wire Protocol (SQL 쿼리용)
      - "9003:9003"   # Health Check
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_TELEMETRY_ENABLED=false
      - QDB_JAVA_OPTS=-Xms128m -Xmx512m
    deploy:
      resources:
        limits:
          memory: 1200m

  postgres:
    image: postgres:17.2-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PW}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=20
      -c wal_buffers=8MB
      -c checkpoint_completion_target=0.9
      -c synchronous_commit=on
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_min_duration_statement=500
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  questdb_data:
  pgdata:
